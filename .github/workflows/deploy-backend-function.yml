name: Build and deploy backend to Azure Function App - swapify-api-func

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: 'swapify-api-func'
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Function App
        run: |
          zip -r deploy.zip . \
            --exclude "frontend/*" \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.zip"
          az functionapp deployment source config-zip \
            --resource-group swapify-rg \
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --src deploy.zip
